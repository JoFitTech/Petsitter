services:
  petsitter-mysql:
    image: mysql:8.4
    container_name: petsitter-mysql
    environment:
      MYSQL_DATABASE: ${DB_NAME:-petsitter}
      MYSQL_USER: ${DB_USER:-petsitter}
      MYSQL_PASSWORD: ${DB_PASSWORD:-petsitter}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - petsitter-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  petsitter-mysql-data:

