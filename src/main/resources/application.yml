spring:
  application:
    name: petsitter
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:petsitter}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:petsitter}
    password: ${DB_PASSWORD:petsitter}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: -1
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate.boot.allow_jdbc_metadata_access: false
  flyway:
    baseline-on-migrate: true
    repair-on-migrate: true
  docker:
    compose:
      enabled: true
      file: compose.yaml

vaadin:
  launch-browser: true

logging:
  level:
    root: INFO
    # DEV: Login-Codes sichtbar im Terminal (nur für lokale Tests!)
    # Zeigt den vollständigen maskierten Code + den Hinweis "masked: 734***"
    # Für noch mehr Details (DEBUG zeigt ALLE Auth-Events):
    com.softwareengineering.petsitter.auth: DEBUG

petsitter:
  security:
    demo:
      enabled: ${PETSITTER_DEMO_ENABLED:true}
      username: ${PETSITTER_DEMO_USERNAME:localuser}
      password: ${PETSITTER_DEMO_PASSWORD:localpass}
      role: ${PETSITTER_DEMO_ROLE:USER}
  # DEV: Zeigt vollständigen Code im Log (ausschalten in PROD!)
  dev:
    show-login-code: ${PETSITTER_DEV_SHOW_LOGIN_CODE:true}
